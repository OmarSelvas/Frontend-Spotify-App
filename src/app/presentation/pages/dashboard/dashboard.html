<div class="dashboard-header">
  <h1>Buenas tardes</h1>
</div>

<section class="section">
  <div class="section-header">
    <h2>Top Global Spotify</h2>
  </div>
  
  <div *ngIf="!isAuthenticated" class="login-prompt">
    <p>Conecta tu cuenta para ver la música</p>
    <button (click)="login()" class="btn-primary">Conectar Spotify</button>
  </div>

  <div *ngIf="isAuthenticated" class="grid-container">
    <div *ngFor="let track of tracks" class="music-card">
      <div class="image-wrapper">
        <img [src]="track.imageUrl" alt="Album Art">
        <button class="play-overlay" (click)="play(track.uri)">▶</button>
      </div>
      <h3>{{ track.name }}</h3>
      <p>{{ track.artist }}</p>
    </div>
  </div>
</section>

<section class="section">
  <h2>Artistas Locales</h2>
  <div class="grid-container">
    <div *ngFor="let artista of artistasLocales" class="music-card">
      <div class="image-wrapper placeholder">🎵</div>
      <h3>{{ artista.name }}</h3>
      <p>{{ artista.genre }}</p>
    </div>
  </div>
</section>
